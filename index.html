<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Cat Tracker ≽^•⩊•^≼</title>
  </head>
  <body>
    <main>
      <p id="currentDate"></p>
      <section>
        <ul>
          <li>
            <label for="litterbox-room-date">
              Deep Clean Litterbox (Room)
            </label>
            <input type="date" id="litterbox-room-date" />
          </li>
          <li>
            <label for="litterbox-kitchen-date">
              Deep Clean Litterbox (Kitchen)
            </label>
            <input type="date" id="litterbox-kitchen-date" />
          </li>
        </ul>
        <ul class="no-bullet-point-list-item">
          <li>
            <input type="checkbox" id="deep-clean-water-fountain" />
            <label for="deep-clean-water-fountain">
              Deep Clean Water Fountain
            </label>
          </li>
          <li>
            <input type="checkbox" id="trim-nails" />
            <label for="trim-nails"> Trim Nails</label>
          </li>
        </ul>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
